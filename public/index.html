<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>should i?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="should i? gives short, honest answers to everyday decisions." />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS7HTM6WYS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PS7HTM6WYS');
  </script>

  <style>
    body {
      margin: 0;
      background: #1f2529;
      color: #e6ecec;
      font-family: 'Open Sans', sans-serif;
    }

    .page {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px 60px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .sub {
      color: #b7c4c4;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      max-width: 500px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
    }

    button {
      margin-top: 10px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: #4db6ac;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #3a9a8a;
    }

    .answer {
      margin-top: 30px;
      background: #273238;
      padding: 20px;
      border-radius: 12px;
      text-align: left;
      position: relative;
    }

    .verdict {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 1.3rem;
      letter-spacing: 0.03em;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .mini-btn {
      margin-top: 0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.86rem;
    }

    .share-status {
      margin-top: 12px;
      color: #b7c4c4;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .viral-line {
      margin-top: 16px;
      color: #9ecfc9;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .examples {
      margin-top: 26px;
      text-align: left;
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;
      background: #273238;
      padding: 18px;
      border-radius: 12px;
    }

    .examples h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1rem;
    }

    .example-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .example-btn {
      background: #314148;
      color: #e6ecec;
      border: 1px solid rgba(255,255,255,0.08);
      margin-top: 0;
    }

    .example-btn:hover {
      background: #3a4a52;
    }

    .footer {
      margin-top: 40px;
      color: #9aa9a9;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .footer a {
      color: #9ecfc9;
      text-decoration: none;
      margin: 0 8px;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .legal {
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>should i?</h1>
    <div class="sub">Make better decisions, rationally and morally.</div>

    <input id="question" placeholder="Should I text my ex?" />
    <br>
    <button onclick="ask()">Ask</button>

    <div id="answer" class="answer" style="display:none;"></div>

    <div class="examples">
      <h3>Try one:</h3>
      <div class="example-buttons">
        <button class="example-btn" onclick="useExample('Should I text my ex?')">Should I text my ex?</button>
        <button class="example-btn" onclick="useExample('Should I skip my workout?')">Should I skip my workout?</button>
        <button class="example-btn" onclick="useExample('Should I buy this?')">Should I buy this?</button>
        <button class="example-btn" onclick="useExample('Should I quit my job?')">Should I quit my job?</button>
        <button class="example-btn" onclick="useExample('Should I send this angry text?')">Should I send this angry text?</button>
        <button class="example-btn" onclick="useExample('Should I drink tonight?')">Should I drink tonight?</button>
      </div>
    </div>

    <div class="footer">
      <div>
        <a href="/privacy.html">Privacy</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
      </div>
      <div class="legal">
        should i? is for reflection and entertainment. It is not professional legal, medical, or financial advice.
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("question");
    let lastQuestion = "";
    let lastVerdict = "";
    let lastAnswer = "";

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        ask();
      }
    });

    function trackEvent(name, params = {}) {
      if (typeof gtag === "function") {
        gtag("event", name, params);
      }
    }

    function categorizeQuestion(question) {
      const q = question.toLowerCase();

      if (q.includes("ex") || q.includes("text") || q.includes("relationship") || q.includes("date")) return "relationships";
      if (q.includes("drink") || q.includes("high") || q.includes("relapse")) return "substances";
      if (q.includes("buy") || q.includes("money") || q.includes("spend")) return "money";
      if (q.includes("job") || q.includes("quit") || q.includes("career")) return "work";
      if (q.includes("workout") || q.includes("gym") || q.includes("run")) return "health";
      if (q.includes("angry") || q.includes("text") || q.includes("email")) return "conflict";

      return "other";
    }

    function useExample(text) {
      input.value = text;
      input.focus();
      trackEvent("example_clicked", {
        example_text: text
      });
    }

    async function shareAnswer() {
      const shareUrl = window.location.href;
      const shareText = `should i?\n\n${lastQuestion}\n\n${lastVerdict}\n${lastAnswer}\n\n${shareUrl}`;

      try {
        if (navigator.share) {
          await navigator.share({
            title: "should i?",
            text: `${lastQuestion}\n\n${lastVerdict}\n${lastAnswer}`,
            url: shareUrl
          });
          setShareStatus("Shared.");
        } else {
          await navigator.clipboard.writeText(shareText);
          setShareStatus("Share text copied. Paste it anywhere.");
        }

        trackEvent("answer_shared", {
          verdict: lastVerdict,
          category: categorizeQuestion(lastQuestion)
        });
      } catch (err) {
        if (err && err.name === "AbortError") return;
        setShareStatus("Could not share. Try again.");
      }
    }

    async function copyAnswer() {
      const text = `${lastQuestion}\n\n${lastVerdict}\n${lastAnswer}\n\n${window.location.href}`;
      try {
        await navigator.clipboard.writeText(text);
        setShareStatus("Copied.");
        trackEvent("answer_copied", {
          verdict: lastVerdict,
          category: categorizeQuestion(lastQuestion)
        });
      } catch (err) {
        setShareStatus("Could not copy.");
      }
    }

    function setShareStatus(message) {
      const statusEl = document.getElementById("shareStatus");
      if (statusEl) statusEl.textContent = message;
    }

    async function ask() {
      const q = input.value.trim();
      if (!q) return;

      const answerBox = document.getElementById("answer");
      answerBox.style.display = "block";
      answerBox.innerHTML = "Thinking...";

      trackEvent("question_asked", {
        question_category: categorizeQuestion(q),
        question_length: q.length
      });

      try {
        const res = await fetch("/api/answer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q })
        });

        const rawText = await res.text();

        let data;
        try {
          data = JSON.parse(rawText);
        } catch {
          throw new Error("Backend error. Try again.");
        }

        if (!res.ok) {
          throw new Error(data.error || "Something went wrong.");
        }

        lastQuestion = q;
        lastVerdict = data.verdict.toUpperCase();
        lastAnswer = data.answer;

        trackEvent("answer_returned", {
          verdict: data.verdict,
          question_category: categorizeQuestion(q)
        });

        answerBox.innerHTML = `
          <div class="verdict">${lastVerdict}</div>
          <div id="shareText">
            <strong>${q}</strong><br><br>
            ${data.answer}
          </div>

          <div class="action-row">
            <button class="mini-btn" onclick="shareAnswer()">Share</button>
            <button class="mini-btn" onclick="copyAnswer()">Copy Answer</button>
          </div>

          <div id="shareStatus" class="share-status"></div>
          <div class="viral-line">Send this to the friend who needs to hear it.</div>
        `;
      } catch (err) {
        answerBox.innerHTML = "Error: " + err.message;
        trackEvent("answer_error", {
          message: err.message
        });
      }
    }
  </script>
</body>
</html>
